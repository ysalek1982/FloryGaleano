name: Smart Family Meals Production Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      VITE_SUPABASE_URL: ${{ secrets.PROD_VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.PROD_VITE_SUPABASE_PUBLISHABLE_KEY }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.PROD_VITE_SUPABASE_ANON_KEY }}
      VITE_APP_ENV: production
      VITE_APP_VERSION: ${{ github.sha }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF_PRODUCTION }}
      SUPABASE_PROJECT_REF_STAGING: ${{ secrets.SUPABASE_PROJECT_REF_STAGING }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD_PRODUCTION }}
      APP_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.PROD_APP_SUPABASE_SERVICE_ROLE_KEY }}
      GEMINI_API_KEY: ${{ secrets.PROD_GEMINI_API_KEY }}
      GEMINI_MODEL: ${{ secrets.PROD_GEMINI_MODEL }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate production environment
        shell: bash
        run: |
          if [[ -n "$VITE_SUPABASE_URL" && ( -n "$VITE_SUPABASE_PUBLISHABLE_KEY" || -n "$VITE_SUPABASE_ANON_KEY" ) ]]; then
            npm run validate:env
          else
            echo "Production frontend environment is incomplete; build/deploy steps will be skipped."
          fi

      - name: Production safety assertions
        shell: bash
        run: |
          present() { if [[ -n "${!1}" ]]; then echo "present"; else echo "missing"; fi; }
          echo "Target environment: production"
          echo "Production Supabase project ref: $(present SUPABASE_PROJECT_REF)"
          echo "Staging Supabase project ref: $(present SUPABASE_PROJECT_REF_STAGING)"
          echo "Production URL: $(present PRODUCTION_URL)"
          echo "Vercel token: $(present VERCEL_TOKEN)"
          echo "Vercel project id: $(present VERCEL_PROJECT_ID)"
          if [[ "$VITE_APP_ENV" != "production" ]]; then
            echo "Production deploy requires VITE_APP_ENV=production."
            exit 1
          fi
          if [[ -n "$SUPABASE_PROJECT_REF" && -n "$SUPABASE_PROJECT_REF_STAGING" && "$SUPABASE_PROJECT_REF" == "$SUPABASE_PROJECT_REF_STAGING" ]]; then
            echo "Production project ref must not equal staging project ref."
            exit 1
          fi
          if [[ -z "$PRODUCTION_URL" ]]; then
            echo "PRODUCTION_URL is required for production post-deploy smoke."
            exit 1
          fi

      - name: Security scan
        run: npm run security:scan

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build production bundle
        if: ${{ env.VITE_SUPABASE_URL != '' && (env.VITE_SUPABASE_PUBLISHABLE_KEY != '' || env.VITE_SUPABASE_ANON_KEY != '') }}
        run: npm run build

      - name: Production dependency audit
        run: npm audit --omit=dev

      - name: Deploy Supabase migrations
        if: ${{ env.SUPABASE_PROJECT_REF != '' && env.SUPABASE_ACCESS_TOKEN != '' && env.SUPABASE_DB_PASSWORD != '' }}
        shell: bash
        run: |
          npx supabase link --project-ref "$SUPABASE_PROJECT_REF"
          npx supabase db push

      - name: Configure Supabase Edge Function secrets
        if: ${{ env.SUPABASE_PROJECT_REF != '' && env.SUPABASE_ACCESS_TOKEN != '' && env.GEMINI_API_KEY != '' }}
        shell: bash
        run: |
          npx supabase secrets set GEMINI_API_KEY="$GEMINI_API_KEY" --project-ref "$SUPABASE_PROJECT_REF"
          if [[ -n "$GEMINI_MODEL" ]]; then
            npx supabase secrets set GEMINI_MODEL="$GEMINI_MODEL" --project-ref "$SUPABASE_PROJECT_REF"
          fi
          if [[ -n "$APP_SUPABASE_SERVICE_ROLE_KEY" ]]; then
            npx supabase secrets set APP_SUPABASE_SERVICE_ROLE_KEY="$APP_SUPABASE_SERVICE_ROLE_KEY" --project-ref "$SUPABASE_PROJECT_REF"
          fi

      - name: Deploy ai-chef Edge Function
        if: ${{ env.SUPABASE_PROJECT_REF != '' && env.SUPABASE_ACCESS_TOKEN != '' }}
        run: npx supabase functions deploy ai-chef --project-ref "$SUPABASE_PROJECT_REF"

      - name: Deploy to Vercel production
        if: ${{ env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' && env.VITE_SUPABASE_URL != '' && (env.VITE_SUPABASE_PUBLISHABLE_KEY != '' || env.VITE_SUPABASE_ANON_KEY != '') }}
        shell: bash
        run: |
          npm install -g vercel@39
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

      - name: Skip production deploy
        if: ${{ env.VERCEL_TOKEN == '' || env.VERCEL_ORG_ID == '' || env.VERCEL_PROJECT_ID == '' || env.VITE_SUPABASE_URL == '' || (env.VITE_SUPABASE_PUBLISHABLE_KEY == '' && env.VITE_SUPABASE_ANON_KEY == '') }}
        run: echo "Skipping Vercel production deploy because required production secrets are not configured."

      - name: Post-deploy smoke tests
        run: npm run smoke:production
