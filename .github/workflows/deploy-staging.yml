name: Smart Family Meals Staging Deploy

on:
  push:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: staging-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    env:
      VITE_SUPABASE_URL: ${{ secrets.STAGING_VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.STAGING_VITE_SUPABASE_PUBLISHABLE_KEY }}
      VITE_APP_ENV: staging
      VITE_APP_VERSION: ${{ github.sha }}
      VITE_SENTRY_DSN: ${{ secrets.STAGING_VITE_SENTRY_DSN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF_STAGING }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD_STAGING }}
      APP_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_APP_SUPABASE_SERVICE_ROLE_KEY }}
      APP_USER_SECRET_ENCRYPTION_KEY: ${{ secrets.STAGING_APP_USER_SECRET_ENCRYPTION_KEY }}
      GEMINI_API_KEY: ${{ secrets.STAGING_GEMINI_API_KEY }}
      GEMINI_MODEL: ${{ secrets.STAGING_GEMINI_MODEL }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      STAGING_URL: ${{ secrets.STAGING_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate staging environment
        shell: bash
        run: |
          if [[ -n "$VITE_SUPABASE_URL" && -n "$VITE_SUPABASE_PUBLISHABLE_KEY" ]]; then
            npm run validate:env -- --mode staging --strict
          else
            echo "Staging frontend environment is incomplete; deploy steps will be skipped."
          fi

      - name: Staging safety assertions
        shell: bash
        run: |
          present() { if [[ -n "${!1}" ]]; then echo "present"; else echo "missing"; fi; }
          echo "Target environment: staging"
          echo "Supabase project ref: $(present SUPABASE_PROJECT_REF)"
          echo "Supabase database password: $(present SUPABASE_DB_PASSWORD)"
          echo "Vercel token: $(present VERCEL_TOKEN)"
          echo "Vercel project id: $(present VERCEL_PROJECT_ID)"
          echo "Staging URL: $(present STAGING_URL)"
          if [[ "$VITE_APP_ENV" != "staging" ]]; then
            echo "Staging deploy requires VITE_APP_ENV=staging."
            exit 1
          fi

      - name: Security scan
        run: npm run security:scan

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build staging bundle
        if: ${{ env.VITE_SUPABASE_URL != '' && env.VITE_SUPABASE_PUBLISHABLE_KEY != '' }}
        run: npm run build

      - name: Production dependency audit
        run: npm audit --omit=dev

      - name: Deploy Supabase migrations to staging
        if: ${{ env.SUPABASE_PROJECT_REF != '' && env.SUPABASE_ACCESS_TOKEN != '' && env.SUPABASE_DB_PASSWORD != '' }}
        shell: bash
        run: |
          npx supabase link --project-ref "$SUPABASE_PROJECT_REF"
          npx supabase db push
          npx supabase migration list

      - name: Configure staging Edge Function secrets
        if: ${{ env.SUPABASE_PROJECT_REF != '' && env.SUPABASE_ACCESS_TOKEN != '' && env.GEMINI_API_KEY != '' }}
        shell: bash
        run: |
          npx supabase secrets set GEMINI_API_KEY="$GEMINI_API_KEY" --project-ref "$SUPABASE_PROJECT_REF"
          if [[ -n "$GEMINI_MODEL" ]]; then
            npx supabase secrets set GEMINI_MODEL="$GEMINI_MODEL" --project-ref "$SUPABASE_PROJECT_REF"
          fi
          if [[ -n "$APP_SUPABASE_SERVICE_ROLE_KEY" ]]; then
            npx supabase secrets set APP_SUPABASE_SERVICE_ROLE_KEY="$APP_SUPABASE_SERVICE_ROLE_KEY" --project-ref "$SUPABASE_PROJECT_REF"
          fi
          if [[ -n "$APP_USER_SECRET_ENCRYPTION_KEY" ]]; then
            npx supabase secrets set APP_USER_SECRET_ENCRYPTION_KEY="$APP_USER_SECRET_ENCRYPTION_KEY" --project-ref "$SUPABASE_PROJECT_REF"
          fi

      - name: Deploy Edge Functions to staging
        if: ${{ env.SUPABASE_PROJECT_REF != '' && env.SUPABASE_ACCESS_TOKEN != '' }}
        shell: bash
        run: |
          npx supabase functions deploy ai-chef --project-ref "$SUPABASE_PROJECT_REF"
          npx supabase functions deploy ai-key-manager --project-ref "$SUPABASE_PROJECT_REF"

      - name: Deploy Vercel preview for staging
        if: ${{ env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' && env.VITE_SUPABASE_URL != '' && env.VITE_SUPABASE_PUBLISHABLE_KEY != '' }}
        shell: bash
        run: |
          npm install -g vercel@39
          vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"
          vercel build --token="$VERCEL_TOKEN"
          DEPLOY_URL="$(vercel deploy --prebuilt --token="$VERCEL_TOKEN" | tail -n 1)"
          echo "DEPLOY_URL=$DEPLOY_URL" >> "$GITHUB_ENV"
          echo "Preview deployment URL captured."

      - name: Skip staging deploy
        if: ${{ env.VERCEL_TOKEN == '' || env.VERCEL_ORG_ID == '' || env.VERCEL_PROJECT_ID == '' || env.VITE_SUPABASE_URL == '' || env.VITE_SUPABASE_PUBLISHABLE_KEY == '' }}
        run: echo "Skipping staging deploy because required staging or Vercel secrets are not configured."

      - name: Post-deploy staging smoke
        shell: bash
        run: npm run smoke:staging -- --url "${DEPLOY_URL:-$STAGING_URL}"
